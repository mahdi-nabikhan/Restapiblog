version: '3.9'

services:
  redis:
    container_name: redis-blog
    image: redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data


  

  backend:
    build: 
      context: ./backend
    container_name: backend-blog
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./backend:/app
    ports:
      - 8000:8000
    environment:
      - SECRET_KEY=test
      - DEBUG=True
    depends_on:
      - redis
      - db

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev-blog
    restart: always
    ports:
      - '5000:80'   # Web UI
      - '25:25'     # SMTP
      - '143:143'   # IMAP
    volumes:
      - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__Urls=http://*:80
      - ServerOptions__HostName=smtp4dev
  worker:
    build: 
      context: ./backend
    command: celery -A RestApiBlog worker --loglevel=info
    depends_on:
      - redis
      - backend
      - db
    volumes:
      - .:/app

volumes:
  smtp4dev-data:
  postgres_data: