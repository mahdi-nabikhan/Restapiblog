version: "3.9"

services:

  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-blog
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build:
      context: ./backend
    container_name: backend-blog
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: test
      DEBUG: "True"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    container_name: celery-worker
    command: celery -A RestApiBlog worker --loglevel=info
    restart: always
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
      - db

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev-blog
    restart: always
    ports:
      - "5000:80"
      - "2525:25"
      - "1143:143"

  elasticsearch:
    image: mirror2.chabokan.net/elasticsearch:8.17.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: mirror2.chabokan.net/elastic/kibana:8.19.16
    container_name: kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  logstash:
    image: mirror2.chabokan.net/logstash:9.4.2
    container_name: logstash
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline

  frontend:
    build:
      context: ./frontend
    container_name: frontend-blog
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  postgres_data:
  elasticsearch_data: