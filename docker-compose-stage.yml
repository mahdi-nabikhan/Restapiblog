version: "3.9"

services:

  # ======================
  # POSTGRES
  # ======================
  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ======================
  # REDIS
  # ======================
  redis:
    image: redis
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    restart: always

  # ======================
  # DJANGO + GUNICORN
  # ======================
  backend:
    build:
      context: ./backend
    container_name: backend
    command: gunicorn RestApiBlog.wsgi --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - SECRET_KEY=test
      - DEBUG=False
    depends_on:
      - db
      - redis
      - elasticsearch

  # ======================
  # CELERY
  # ======================
  worker:
    build:
      context: ./backend
    container_name: celery-worker
    command: celery -A RestApiBlog worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
      - db

  # ======================
  # SMTP4DEV
  # ======================
  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev
    restart: always
    ports:
      - "5000:80"
      - "25:25"
      - "143:143"
    volumes:
      - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__Urls=http://*:80
      - ServerOptions__HostName=smtp4dev

  # ======================
  # ELASTICSEARCH
  # ======================
  elasticsearch:
    image: mirror2.chabokan.net/elasticsearch:8.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # ======================
  # KIBANA
  # ======================
  kibana:
    image: mirror2.chabokan.net/elastic/kibana:8.17.0
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped

  # ======================
  # LOGSTASH
  # ======================
  logstash:
    image: mirror2.chabokan.net/logstash:9.4.2
    container_name: logstash
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    restart: unless-stopped

  # ======================
  # NGINX
  # ======================
  nginx:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/home/app/static
      - media_volume:/home/app/media

volumes:
  postgres_data:
  elasticsearch_data:
  smtp4dev-data:
  static_volume:
  media_volume: